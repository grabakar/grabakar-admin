name: Deploy Admin (GCP Free Tier)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-admin-staging
  cancel-in-progress: false

env:
  GCP_REGION: us-central1
  GCS_BUCKET: grabakar-admin-staging
  VITE_API_URL: https://grabakar-backend-1089044937741.us-central1.run.app

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ env.VITE_API_URL }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/1089044937741/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider-2'
          service_account: 'github-actions@grabakar-staging.iam.gserviceaccount.com'

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Upload to GCS (SPA)
        run: |
          gcloud storage rsync dist/ "gs://${{ env.GCS_BUCKET }}/" \
            --recursive \
            --delete-unmatched-destination-objects

          # Ensure index.html is NEVER cached by browsers to prevent broken updates
          gcloud storage objects update "gs://${{ env.GCS_BUCKET }}/index.html" --cache-control="no-cache, max-age=0"

          # Ensure SPA routing works after updates
          BUCKET_UPDATE_ARGS="--web-main-page-suffix=index.html --web-error-page=index.html"
          echo "Sanity check: gcloud storage buckets update args: ${BUCKET_UPDATE_ARGS}"
          if [[ "${BUCKET_UPDATE_ARGS}" == *"--web-not-found-page"* ]]; then
            echo "ERROR: forbidden flag --web-not-found-page detected (typo)."
            exit 1
          fi
          gcloud storage buckets update "gs://${{ env.GCS_BUCKET }}/" ${BUCKET_UPDATE_ARGS}

      - name: Verify deployment
        run: |
          URL="https://storage.googleapis.com/${{ env.GCS_BUCKET }}/index.html"
          STATUS="$(curl -s -o /dev/null -w "%{http_code}" "$URL" || true)"
          if [ "$STATUS" != "200" ]; then
            echo "ERROR: expected 200 from $URL, got $STATUS"
            exit 1
          fi
          echo "Admin deployed OK (HTTP 200)"

